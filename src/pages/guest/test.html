<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đổi Mật Khẩu | CozyPot Hotpot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --cozy-red: #8b1a1a;
            --text-dark: #2d3436;
            --text-light: #636e72;
            --bg-body: #fdfdfd;
            --border: #eeeeee;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; font-size: 15px; background: var(--bg-body); color: var(--text-dark); }

        /* --- HEADER --- */
        .main-header {
            background: #fff; padding: 15px 20px; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000;
        }
        .logo { display: flex; align-items: center; gap: 12px; font-weight: bold; color: var(--cozy-red); font-size: 22px; text-decoration: none; }

        /* --- LAYOUT --- */
        .page-wrapper { display: flex; min-height: calc(100vh - 80px); }

        .sidebar { width: 280px; background: #fff; border-right: 1px solid var(--border); padding: 40px 0; flex-shrink: 0; }
        .nav-menu { list-style: none; }
        .nav-menu li a {
            display: flex; align-items: center; padding: 15px 30px; color: var(--text-light); 
            text-decoration: none; transition: 0.3s; border-left: 4px solid transparent;
        }
        .nav-menu li a:hover, .nav-menu li a.active {
            background: #fff9f9; color: var(--cozy-red); border-left-color: var(--cozy-red); padding-left: 40px;
        }

        /* --- CONTENT RỘNG FULL (CÁCH LỀ 10PX) --- */
        .main-content { 
            flex: 1; 
            padding: 20px 10px; 
            display: flex; 
            justify-content: center; 
        }

        .password-card {
            width: 100%; 
            max-width: 100%; 
            background: white; 
            padding: 60px 5%; 
            border: 1px solid var(--border); 
            border-radius: 8px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.02);
        }

        .section-header { margin-bottom: 40px; }
        .section-header h1 { font-size: 28px; color: var(--cozy-red); text-transform: uppercase; margin-bottom: 10px; }

        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; font-weight: 600; font-size: 13px; color: var(--text-light); margin-bottom: 10px; text-transform: uppercase; }
        
        .input-wrapper { position: relative; width: 100%; }
        input {
            width: 100%; 
            padding: 18px 20px; 
            border: 1px solid #e0e0e0; 
            border-radius: 4px;
            font-size: 16px; 
            background: #fafafa; 
            outline: none; 
            transition: 0.3s;
        }
        input:focus { border-color: var(--cozy-red); background: #fff; box-shadow: 0 0 0 3px rgba(139, 26, 26, 0.05); }

        .toggle-password { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #bbb; font-size: 18px; }

        .password-requirements { margin: 20px 0 35px; }
        .password-requirements ul { list-style: none; color: #856404; font-size: 14px; background: #fff9e6; padding: 12px 20px; border-radius: 4px; display: inline-block; }
        .password-requirements li { display: flex; align-items: center; gap: 8px; }

        /* --- FORM ACTIONS (NGANG HÀNG) --- */
        .form-actions {
            display: flex;
            justify-content: space-between; /* Đẩy 2 phần tử về 2 đầu */
            align-items: center;
            margin-top: 20px;
        }

        .btn-submit {
            background: var(--cozy-red); 
            color: white; 
            padding: 18px 50px; 
            border: none;
            border-radius: 4px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer;
            transition: 0.3s; 
            text-transform: uppercase;
        }
        .btn-submit:hover { background: #6b1414; transform: translateY(-1px); }

        .forgot-pass-link {
            color: var(--cozy-red);
            text-decoration: none;
            font-size: 17px;
            font-weight: 500;
            transition: 0.2s;
        }
        .forgot-pass-link:hover { text-decoration: underline; opacity: 0.8; }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .password-card { padding: 30px 20px; }
            .form-actions { flex-direction: column-reverse; gap: 20px; align-items: flex-start; }
            .btn-submit { width: 100%; }
        }
    </style>
</head>
<body>

    <header class="main-header">
        <a href="#" class="logo">COZYPOT</a>
        <div style="font-weight: 600;">Lê Quang Thái <i class="fas fa-user-circle" style="margin-left: 8px;"></i></div>
    </header>

    <div class="page-wrapper">
        <aside class="sidebar">
            <ul class="nav-menu">
                <li><a href="#"><i class="far fa-user"></i> Hồ sơ của tôi</a></li>
                <li><a href="#"><i class="fas fa-utensils"></i> Lịch sử đặt bàn</a></li>
                <li><a href="#" class="active"><i class="fas fa-key"></i> Đổi mật khẩu</a></li>
                <li><a href="#"><i class="fas fa-sign-out-alt"></i> Đăng xuất</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <div class="password-card">
                <div class="section-header">
                    <h1>THAY ĐỔI MẬT KHẨU</h1>
                    <p>Nhập mật khẩu hiện tại và mật khẩu mới để cập nhật.</p>
                </div>

                <form id="changePasswordForm">
                    <div class="form-group">
                        <label>Mật khẩu hiện tại</label>
                        <div class="input-wrapper">
                            <input type="password" id="old-pass" required placeholder="Nhập mật khẩu cũ">
                            <i class="far fa-eye toggle-password"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Mật khẩu mới</label>
                        <div class="input-wrapper">
                            <input type="password" id="new-pass" required placeholder="Tối thiểu 6 ký tự">
                            <i class="far fa-eye toggle-password"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Xác nhận mật khẩu mới</label>
                        <div class="input-wrapper">
                            <input type="password" id="confirm-pass" required placeholder="Nhập lại mật khẩu mới">
                            <i class="far fa-eye toggle-password"></i>
                        </div>
                    </div>

                    <div class="password-requirements">
                        <ul>
                            <li><i class="fas fa-check-circle"></i> Tối thiểu 6 ký tự</li>
                        </ul>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn-submit">CẬP NHẬT MẬT KHẨU</button>
                        <a href="#" class="forgot-pass-link">Quên mật khẩu hiện tại?</a>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script>
        // Toggle ẩn hiện mật khẩu
        document.querySelectorAll('.toggle-password').forEach(icon => {
            icon.addEventListener('click', function() {
                const input = this.parentElement.querySelector('input');
                const isPassword = input.type === "password";
                input.type = isPassword ? "text" : "password";
                this.classList.toggle('fa-eye', !isPassword);
                this.classList.toggle('fa-eye-slash', isPassword);
            });
        });

        // Xử lý Submit
        document.getElementById('changePasswordForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const oldP = document.getElementById('old-pass').value;
            const newP = document.getElementById('new-pass').value;
            const cfP = document.getElementById('confirm-pass').value;

            if (newP.length < 6) {
                alert('Mật khẩu mới phải từ 6 ký tự trở lên!');
                return;
            }
            if (newP === oldP) {
                alert('Mật khẩu mới không được trùng với mật khẩu cũ!');
                return;
            }
            if (newP !== cfP) {
                alert('Xác nhận mật khẩu mới không chính xác!');
                return;
            }

            alert('Đổi mật khẩu thành công!');
        });
    </script>
</body>
</html>
